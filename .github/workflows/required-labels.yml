name: Require semver label
on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: mheap/github-action-required-labels@v5.6.0
        with:
          mode: exactly
          count: 1
          labels: "major, minor, patch"
